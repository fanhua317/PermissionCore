server:
  port: 54321
  servlet:
    context-path: /

spring:
  application:
    name: permacore-iam
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${DB_URL:jdbc:mysql://localhost:3306/permacore_iam?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD}
    hikari:
      minimum-idle: 2
      maximum-pool-size: 20
      idle-timeout: 30000
      max-lifetime: 1800000
      connection-timeout: 30000
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: ${REDIS_DATABASE:0}
      timeout: 10000ms
  servlet:
    multipart:
      max-file-size: 2MB
      max-request-size: 3MB

app:
  redis:
    enabled: ${REDIS_ENABLED:false}
  bootstrap:
    enabled: ${APP_BOOTSTRAP_ENABLED:false}
    admin-password: ${APP_BOOTSTRAP_ADMIN_PASSWORD:}
  security:
    public-docs: ${PUBLIC_API_DOCS:false}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173}
  upload:
    avatar-path: ${AVATAR_UPLOAD_PATH:uploads/avatars}

mybatis-plus:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.permacore.iam.domain.entity
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: delFlag
      logic-delete-value: 1
      logic-not-delete-value: 0

jwt:
  secret: ${JWT_SECRET}
  expiration: ${JWT_EXPIRATION_SECONDS:7200}
  refresh-expiration: ${JWT_REFRESH_EXPIRATION_SECONDS:604800}

logging:
  level:
    root: INFO
    com.permacore.iam: INFO
    com.permacore.iam.mapper: INFO

springdoc:
  api-docs:
    enabled: true
    path: /v3/api-docs
  swagger-ui:
    enabled: true
    path: /doc.html
