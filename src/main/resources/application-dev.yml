# Local development overrides. API documentation remains opt-in.
app:
  redis:
    enabled: false
  security:
    public-docs: ${PUBLIC_API_DOCS:false}

mybatis-plus:
  configuration:
    log-impl: ${MYBATIS_LOG_IMPL:org.apache.ibatis.logging.nologging.NoLoggingImpl}

logging:
  level:
    com.permacore.iam: DEBUG
    com.permacore.iam.mapper: INFO
