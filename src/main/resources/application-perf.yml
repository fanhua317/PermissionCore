server:
  port: 15432

app:
  security:
    public-metrics: true

spring:
  datasource:
    hikari:
      minimum-idle: ${PERF_HIKARI_MIN_IDLE:2}
      maximum-pool-size: ${PERF_HIKARI_MAX_POOL_SIZE:20}

# Dedicated metrics server for the isolated performance environment. The
# Compose file publishes this port only on 127.0.0.1.
management:
  server:
    address: 0.0.0.0
    port: 15433
  endpoints:
    enabled-by-default: false
    web:
      discovery:
        enabled: false
      exposure:
        include: prometheus
  endpoint:
    prometheus:
      enabled: true
  metrics:
    tags:
      application: ${spring.application.name}
      environment: perf
    distribution:
      percentiles-histogram:
        http.server.requests: true
      slo:
        http.server.requests: 10ms,25ms,50ms,100ms,200ms,500ms,1s
