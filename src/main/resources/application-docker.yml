spring:
  datasource:
    url: jdbc:mysql://mysql:3306/permacore_iam?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: ${MYSQL_USER}
    password: ${MYSQL_PASSWORD}
  data:
    redis:
      host: redis
      port: 6379
      password: ${REDIS_PASSWORD}

app:
  redis:
    enabled: true
  bootstrap:
    enabled: ${APP_BOOTSTRAP_ENABLED:false}
    admin-password: ${APP_BOOTSTRAP_ADMIN_PASSWORD:}
  security:
    public-docs: ${PUBLIC_API_DOCS:false}

mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.nologging.NoLoggingImpl

logging:
  level:
    root: INFO
    com.permacore.iam: INFO
    com.permacore.iam.mapper: INFO
